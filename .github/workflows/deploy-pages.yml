name: Deploy Nuxt to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build Nuxt
        run: |
          npm run build
          npm run generate || true

      - name: Prepare Pages output
        run: |
          mkdir -p out
          if [ -d "dist" ]; then cp -a dist/. out/; elif [ -d ".output/public" ]; then cp -a .output/public/. out/; else echo "No static output found" && exit 1; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: out

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v1
